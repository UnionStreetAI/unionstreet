# Publishes @unionstreet/us via Changesets + npm trusted publishing (OIDC).
# npm package settings → Trusted Publisher:
#   org/user: UnionStreetAI
#   repository: unionstreet
#   workflow filename: release.yml
#   environment: release (must match job environment below)
name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Version and publish
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Use npm with trusted-publishing support
        run: npm install -g npm@latest

      - name: Install
        run: bun install --frozen-lockfile

      - name: Create release pull request
        id: changesets
        uses: changesets/action@v1
        with:
          version: bun run version-packages
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Top-level npm publish so OIDC env vars reach npm (not via bun/changesets subprocess).
      - name: Publish to npm via OIDC
        if: steps.changesets.outputs.hasChangesets == 'false'
        working-directory: packages/npm
        env:
          NODE_AUTH_TOKEN: ""
          NPM_TOKEN: ""
        run: |
          unset NODE_AUTH_TOKEN NPM_TOKEN
          PKG_VERSION=$(node -p "require('./package.json').version")
          if npm view "@unionstreet/us@${PKG_VERSION}" version >/dev/null 2>&1; then
            echo "@unionstreet/us@${PKG_VERSION} already on npm, skipping"
          else
            echo "Publishing @unionstreet/us@${PKG_VERSION} via trusted publisher"
            npm publish --access public
          fi
