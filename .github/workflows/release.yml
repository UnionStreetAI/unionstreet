# Publishes @unionstreet/us via Changesets + npm trusted publishing (OIDC).
# npm → @unionstreet/us → Settings → Trusted Publisher (package page, not org-only):
#   Organization: UnionStreetAI  (case-sensitive)
#   Repository: unionstreet
#   Workflow filename: release.yml
#   Environment: (empty)
name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Version and publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      # No registry-url — it writes _authToken=${NODE_AUTH_TOKEN} into .npmrc and breaks OIDC (npm/cli#8730).
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Use npm with trusted-publishing support
        run: npm install -g npm@latest

      - name: Install
        run: bun install --frozen-lockfile

      - name: Create release pull request
        id: changesets
        uses: changesets/action@v1
        with:
          version: bun run version-packages
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm via OIDC
        if: steps.changesets.outputs.hasChangesets == 'false'
        working-directory: packages/npm
        run: |
          set -euo pipefail
          # Remove setup-node/npmrc token placeholders so npm uses GitHub OIDC (npm/cli#8730).
          rm -f "${NPM_CONFIG_USERCONFIG:-}"
          unset NODE_AUTH_TOKEN NPM_TOKEN NPM_CONFIG_USERCONFIG

          PKG_VERSION=$(node -p "require('./package.json').version")
          if npm view "@unionstreet/us@${PKG_VERSION}" version >/dev/null 2>&1; then
            echo "@unionstreet/us@${PKG_VERSION} already on npm, skipping"
            exit 0
          fi

          echo "Publishing @unionstreet/us@${PKG_VERSION} (verbose OIDC — look for POST .../oidc/token/exchange → 201)"
          npm publish --access public --loglevel verbose 2>&1 | tee /tmp/npm-publish.log
          if grep -q "oidc/token/exchange" /tmp/npm-publish.log; then
            grep -E "oidc/token/exchange|verbose oidc" /tmp/npm-publish.log || true
          fi
