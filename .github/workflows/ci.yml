name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install
        run: bun install --frozen-lockfile

      - name: Typecheck, tests, smoke, and build
        run: bun run check:parallel

      - name: Stress runtime boundaries
        run: bun run test:stress

      - name: Dependency audit
        run: bun audit
